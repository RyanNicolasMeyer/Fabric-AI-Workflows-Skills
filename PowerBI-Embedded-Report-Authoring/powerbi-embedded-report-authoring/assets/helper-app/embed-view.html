<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Embedded Report View</title>
  <style>
    :root {
      --bg: #f3f7fb;
      --ink: #0d1726;
      --muted: #536275;
      --error: #d7263d;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: linear-gradient(180deg, #f9fcff 0%, #edf4fb 100%);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .shell {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(83, 98, 117, 0.18);
      backdrop-filter: blur(12px);
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .meta strong {
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .status-line {
      color: var(--muted);
      font-size: 12px;
    }

    .status-line[data-level="error"] {
      color: var(--error);
    }

    #reportContainer {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body data-mode="view">
  <header class="shell">
    <div class="meta">
      <strong id="reportName">Embedded report preview</strong>
      <span id="statusLine" class="status-line">Booting preview harness…</span>
    </div>
  </header>
  <div id="reportContainer"></div>
  <script src="/vendor/powerbi-client/powerbi.min.js"></script>
  <script src="/vendor/powerbi-report-authoring/powerbi-report-authoring.js"></script>
  <script src="/session-config.js"></script>
  <script src="/shared/report-bootstrap.js"></script>
</body>
</html>
